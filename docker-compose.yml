
version: "3.9"

services:
  app:
    ports: 
      - "8000:8000"
    env_file:
        - .env
    build: .
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  db_test:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=job_matcher_test
    ports:
      - "5433:5432"

volumes:
  postgres_data:

